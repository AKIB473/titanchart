name: Build Android APK

# ══════════════════════════════════════════════════════════════════════════════
#
#  HOW TO USE:
#
#  1. Fork this repository
#  2. Put your web files (HTML, CSS, JS) inside the  www/  folder
#  3. Push to the main branch
#  4. Wait ~5 minutes → download your APK from the Artifacts section
#
#  That's it. No Android Studio. No setup. No secrets needed.
#
#  To get a Play-Store-ready AAB with a permanent key:
#    → Go to Actions → "Setup Keystore" → Run workflow (once)
#    → After that, all builds use your permanent key automatically
#
# ══════════════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"

jobs:

  build:
    name: Build APK + AAB
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Node.js + Java ────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # ── 3. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 4. Install npm packages ──────────────────────────────────────────────
      - name: Install npm packages
        run: npm ci

      # ── 5. Verify www/ folder ────────────────────────────────────────────────
      - name: Verify www folder
        run: |
          if [ ! -d "www" ] || [ ! -f "www/index.html" ]; then
            echo ""
            echo "ERROR: www/index.html not found!"
            echo ""
            echo "Put your web app files in the www/ folder:"
            echo "  www/index.html   (required)"
            echo "  www/style.css    (optional)"
            echo "  www/app.js       (optional)"
            echo ""
            exit 1
          fi
          echo "www/ folder OK:"
          ls -la www/

      # ── 6. Detect version ────────────────────────────────────────────────────
      - name: Detect version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "1.0.0")
          fi
          CODE=$(git rev-list --count HEAD 2>/dev/null || echo "1")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$CODE"       >> $GITHUB_OUTPUT
          echo "Building v$VERSION (code $CODE)"

      # ── 7. Capacitor sync ────────────────────────────────────────────────────
      - name: Capacitor sync
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      # ── 8. Set version ───────────────────────────────────────────────────────
      - name: Set version in build.gradle
        run: |
          sed -i "s/versionCode .*/versionCode ${{ steps.version.outputs.code }}/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"${{ steps.version.outputs.version }}\"/" android/app/build.gradle

      # ── 9. Setup signing ─────────────────────────────────────────────────────
      - name: Setup signing keystore
        run: python3 ci/setup_keystore.py
        env:
          KEYSTORE_BASE64:          ${{ secrets.KEYSTORE_BASE64 }}
          SIGNING_STORE_PASSWORD:   ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS:        ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:     ${{ secrets.SIGNING_KEY_PASSWORD }}

      # ── 10. Build APK ────────────────────────────────────────────────────────
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon 2>&1 | tail -40
        env:
          SIGNING_STORE_PASSWORD:   ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS:        ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:     ${{ secrets.SIGNING_KEY_PASSWORD }}

      # ── 11. Build AAB (Play Store) ────────────────────────────────────────────
      - name: Build AAB (Google Play)
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon 2>&1 | tail -20
        env:
          SIGNING_STORE_PASSWORD:   ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS:        ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:     ${{ secrets.SIGNING_KEY_PASSWORD }}

      # ── 12. Rename outputs ───────────────────────────────────────────────────
      - name: Rename output files
        run: |
          V="${{ steps.version.outputs.version }}"
          D=$(date +%Y%m%d)
          APK="android/app/build/outputs/apk/release/app-release.apk"
          AAB="android/app/build/outputs/bundle/release/app-release.aab"

          [ -f "$APK" ] && mv "$APK" "android/app/build/outputs/apk/release/app-v${V}-${D}.apk"
          [ -f "$AAB" ] && mv "$AAB" "android/app/build/outputs/bundle/release/app-v${V}-${D}.aab"

          echo "Output files:"
          find android/app/build/outputs -name "*.apk" -o -name "*.aab" 2>/dev/null

      # ── 13. Upload APK artifact ──────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-v${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      # ── 14. Upload AAB artifact ──────────────────────────────────────────────
      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: AAB-v${{ steps.version.outputs.version }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: error

      # ── 15. Upload build logs on failure ─────────────────────────────────────
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: android/app/build/reports/
          retention-days: 7

      # ── 16. Summary ──────────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" 2>/dev/null | head -1)
          AAB=$(find android/app/build/outputs/bundle -name "*.aab" 2>/dev/null | head -1)

          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | v${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | ${{ steps.version.outputs.code }} |" >> $GITHUB_STEP_SUMMARY
          [ -n "$APK" ] && echo "| APK | $(basename $APK) |" >> $GITHUB_STEP_SUMMARY
          [ -n "$AAB" ] && echo "| AAB | $(basename $AAB) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download your APK from the **Artifacts** section below." >> $GITHUB_STEP_SUMMARY

  # ── GitHub Release on tag ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: APK-v${{ needs.build.outputs.version }}
          path: files/
      - uses: actions/download-artifact@v4
        with:
          name: AAB-v${{ needs.build.outputs.version }}
          path: files/
      - uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.build.outputs.version }}"
          body: |
            ### Download
            - **APK** — install directly on any Android 7+ device
            - **AAB** — upload to Google Play Store
          files: files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
